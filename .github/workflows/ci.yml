name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Install
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Type check
        run: uv run mypy src/agentkit/core
      - name: Agent and skill contract gate
        run: uv run agentkit validate-catalog
      - name: Context contract gate
        run: uv run agentkit validate-contexts
      - name: Eval suite contract gate
        run: uv run agentkit eval-suite evaluation/suites/trajectory.yaml --validate-only
      - name: Test
        run: uv run pytest -q
