id: runtime.capability-route
version: 1
owner: runtime
templates:
  system: system.md
  user: user.md
fragments: [json-only]
instructions:
  agent: true
  skill: false
inputs:
  - name: message
    source: request.message
    required: true
    priority: 100
    max_chars: 4000
  - name: goal
    source: request.goal
    required: true
    priority: 100
    max_chars: 2000
  - name: candidate_skills
    source: routing.candidate_skills
    required: true
    priority: 100
    serializer: canonical_json
    max_items: 20
    max_chars: 8000
    truncate: head
exclude: [secrets, tool_credentials, skill.handler]
limits:
  max_input_tokens: 6000
  response_reserve_tokens: 1200
output:
  mode: json
  schema: output.schema.json
audit:
  record_input_names: true
  record_content_hashes: true
  record_rendered_content: false
