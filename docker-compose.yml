services:
  web:
    build: .
    image: agentkit-web:latest
    # Secrets and tokens are injected from .env (never baked into the image):
    #   AGENTKIT_WEB_AUTH_TOKEN, AGENTKIT_WEB_SECRET_KEY, LLM credentials, etc.
    env_file:
      - .env
    # Connect to the Postgres already running on the HOST (not a compose-managed
    # db). These container overrides win over .env; the DB name / user / password
    # still come from .env. host.docker.internal resolves to the host via the
    # host-gateway mapping in extra_hosts below (Docker 20.10+ on Linux).
    environment:
      AGENTKIT_VECTOR_STORE_BACKEND: postgres
      AGENTKIT_PG_HOST: host.docker.internal
      AGENTKIT_PG_PORT: "5432"
      AGENTKIT_PG_SSLMODE: disable
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8501:8501"
    volumes:
      # Business config is editable on the host and mounted read-only.
      - ./tenants:/app/tenants:ro
      - ./prompts:/app/prompts:ro
      - ./skills:/app/skills:ro
      # Audit / conversation / checkpoint SQLite DBs persist in a named volume.
      - agentkit_data:/app/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8501/healthz', timeout=3).status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  agentkit_data:
