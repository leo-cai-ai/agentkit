package_id: candidate-rank
tools:
  - id: ats.get_job
    provider: python
    description: 从 ATS 获取职位需求。
    entrypoint: scripts.tools:get_job
    risk: read_only
    permissions: [hr.job.read]
    idempotent: true
    timeout_seconds: 15
  - id: ats.get_candidates
    provider: python
    description: 从 ATS 批量获取候选人资料。
    entrypoint: scripts.tools:get_candidates
    risk: read_only
    permissions: [hr.candidate.read]
    supports_batch: true
    idempotent: true
    timeout_seconds: 30
capabilities:
  - id: candidate.rank
    domain: hr.recruitment
    description: 根据岗位要求批量评估和排序候选人。
    entrypoint: scripts.handler:run
    execution: {reasoning: direct, orchestration: batch, tool_policy: read_only, allow_dynamic_selection: true}
    autonomy: {max_model_calls: 8, max_tool_calls: 16, max_iterations: 6, max_plan_steps: 6, max_replans: 1, max_tokens: 20000, timeout_seconds: 180}
    permissions: [hr.job.read, hr.candidate.read]
    tools: [ats.get_job, ats.get_candidates]
    input_schema:
      type: object
      required: [job_id, candidate_ids]
      properties:
        job_id: {type: string, minLength: 1}
        candidate_ids: {type: array, minItems: 1, items: {type: string, minLength: 1}}
        top_n: {type: integer, minimum: 1, default: 5}
    output_schema:
      type: object
      properties:
        ranked_candidates: {type: array}
        evaluated_count: {type: integer}
    batch_key: candidate_ids
    keywords: [筛选, 候选人, 简历, candidate, rank, resume]
