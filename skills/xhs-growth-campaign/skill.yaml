package_id: xhs-growth-campaign
tools:
  - id: xhs.rpa.search_top_notes
    provider: python
    description: 通过租户配置的 RPA Provider 搜索小红书内容。
    entrypoint: scripts.tools:search_top_notes_tool
    factory_entrypoint: scripts.tools:build_handlers
    risk: read_only
    permissions: [content.research]
    supports_batch: true
    idempotent: true
    timeout_seconds: 120
  - id: xhs.rpa.create_publish_package
    provider: python
    description: 创建等待人工审核的发布草稿包。
    entrypoint: scripts.tools:create_publish_package_tool
    factory_entrypoint: scripts.tools:build_handlers
    risk: governed
    permissions: [content.publish]
    idempotent: false
    timeout_seconds: 120
  - id: xhs.rpa.publish_note
    provider: python
    description: 发布审批后冻结的小红书内容包。
    entrypoint: scripts.tools:publish_note_tool
    factory_entrypoint: scripts.tools:build_handlers
    risk: side_effect
    permissions: [content.publish]
    idempotent: true
    timeout_seconds: 300
  - id: xhs.metrics.fetch
    provider: python
    description: 获取或初始化增长活动指标。
    entrypoint: scripts.tools:fetch_metrics_tool
    factory_entrypoint: scripts.tools:build_handlers
    risk: read_only
    permissions: [content.research]
    idempotent: true
    timeout_seconds: 30
capabilities:
  - id: xhs.growth.campaign
    domain: marketing.social_growth
    description: 执行完整的小红书增长 Workflow。
    entrypoint: scripts.handlers:run_growth_campaign
    execution: {reasoning: direct, orchestration: workflow, tool_policy: governed}
    autonomy: {max_model_calls: 16, max_tool_calls: 20, max_iterations: 8, max_plan_steps: 10, max_replans: 1, max_tokens: 40000, timeout_seconds: 600}
    review: {enabled: true, max_revisions: 1, exhausted_status: blocked}
    permissions: [content.research, content.write, content.publish]
    tools: [xhs.rpa.search_top_notes, xhs.rpa.create_publish_package, xhs.rpa.publish_note, xhs.metrics.fetch]
    input_schema:
      type: object
      required: [topic]
      properties:
        topic: {type: string, minLength: 1, maxLength: 100}
        top_n: {type: integer, minimum: 1, maximum: 20, default: 5}
        goal_days: {type: integer, minimum: 1, maximum: 365, default: 30}
        target_followers: {type: integer, minimum: 1, default: 10000}
        cadence: {type: string, enum: [daily, weekdays, weekly], default: daily}
    output_schema: {type: object, properties: {workflow_trace: {type: array}, publish: {type: object}}}
    keywords: [xiaohongshu, xhs, rednote, growth, followers, campaign, publish, 小红书, 涨粉, 爆款, 发布]
  - id: xhs.trend.research
    domain: marketing.social_growth
    description: 自主选择只读搜索 Observation，研究指定主题的热门内容。
    entrypoint: scripts.handlers:research_trends
    execution: {reasoning: react, orchestration: single, tool_policy: read_only, allow_dynamic_selection: true}
    autonomy: {max_model_calls: 8, max_tool_calls: 8, max_iterations: 5, max_plan_steps: 1, max_replans: 0, max_tokens: 12000, timeout_seconds: 180}
    permissions: [content.research]
    tools: [xhs.rpa.search_top_notes]
    input_schema:
      type: object
      required: [topic]
      properties: {topic: {type: string, minLength: 1, maxLength: 100}, top_n: {type: integer, minimum: 1, maximum: 20, default: 5}}
    output_schema: {type: object, properties: {}}
    keywords: [top, research, notes, videos, 爆款, 案例]
  - id: xhs.case.extract
    domain: marketing.social_growth
    description: 提取热门内容的结构与互动信号。
    entrypoint: scripts.handlers:extract_case_signals
    execution: {reasoning: direct, orchestration: single, tool_policy: none}
    permissions: [content.research]
    tools: []
    input_schema: {type: object, properties: {}}
    output_schema: {type: object, properties: {}}
    keywords: [extract, signals, hook, 提炼, 卖点]
  - id: xhs.case.compare
    domain: marketing.social_growth
    description: 对比案例并识别可复用的增长模式。
    entrypoint: scripts.handlers:compare_case_patterns
    execution: {reasoning: direct, orchestration: single, tool_policy: none}
    permissions: [content.research]
    tools: []
    input_schema: {type: object, properties: {}}
    output_schema: {type: object, properties: {}}
    keywords: [compare, patterns, 对比, 总结]
  - id: xhs.strategy.plan
    domain: marketing.social_growth
    description: 制定三十天增长策略。
    entrypoint: scripts.handlers:plan_growth_strategy
    execution: {reasoning: direct, orchestration: single, tool_policy: none}
    permissions: [content.research, content.write]
    tools: []
    input_schema: {type: object, properties: {}}
    output_schema: {type: object, properties: {}}
    keywords: [strategy, kpi, 30 days, 策略, 涨粉]
  - id: xhs.copy.generate
    domain: marketing.social_growth
    description: 根据策略和案例证据生成文案。
    entrypoint: scripts.handlers:generate_copy
    execution: {reasoning: direct, orchestration: single, tool_policy: none}
    permissions: [content.write]
    tools: []
    input_schema: {type: object, properties: {}}
    output_schema: {type: object, properties: {}}
    keywords: [copy, article, draft, 文案, 文章]
  - id: xhs.copy.review
    domain: marketing.social_growth
    description: 审核文案的品牌安全和事实依据。
    entrypoint: scripts.handlers:review_copy
    execution: {reasoning: direct, orchestration: single, tool_policy: none}
    permissions: [content.write]
    tools: []
    input_schema: {type: object, properties: {}}
    output_schema: {type: object, properties: {}}
    keywords: [review, brand, compliance, 审核]
  - id: xhs.copy.revise
    domain: marketing.social_growth
    description: 根据结构化审核意见对文案进行一次受限修订。
    entrypoint: scripts.handlers:revise_copy
    execution: {reasoning: direct, orchestration: single, tool_policy: none}
    permissions: [content.write]
    tools: []
    input_schema: {type: object, properties: {}}
    output_schema: {type: object, properties: {}}
    keywords: [revise, rewrite, 修订, 改写]
  - id: xhs.publish.prepare
    domain: marketing.social_growth
    description: 创建受治理的小红书发布草稿包。
    entrypoint: scripts.handlers:prepare_publish
    execution: {reasoning: direct, orchestration: single, tool_policy: governed}
    autonomy: {max_model_calls: 4, max_tool_calls: 4, max_iterations: 3, max_tokens: 10000, timeout_seconds: 180}
    permissions: [content.publish]
    tools: [xhs.rpa.create_publish_package]
    input_schema: {type: object, properties: {}}
    output_schema: {type: object, properties: {}}
    keywords: [publish, draft, 发布, 草稿]
  - id: xhs.metrics.track
    domain: marketing.social_growth
    description: 初始化或获取增长指标与下次检查点。
    entrypoint: scripts.handlers:track_metrics
    execution: {reasoning: direct, orchestration: single, tool_policy: read_only}
    permissions: [content.research]
    tools: [xhs.metrics.fetch]
    input_schema: {type: object, properties: {}}
    output_schema: {type: object, properties: {}}
    keywords: [metrics, kpi, followers, 数据, 指标]
