<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in | Enterprise AI Workforce</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
  </head>
  <body class="login-page" data-page="login">
    <main class="login-shell">
      <section class="login-card" aria-labelledby="login-title">
        <div class="login-brand">
          <span class="login-brand-mark" aria-hidden="true">EA</span>
          <span class="login-brand-copy">
            <span class="login-brand-name">Enterprise AI</span>
            <span class="login-brand-product">Workforce Console</span>
          </span>
        </div>

        <header class="login-heading">
          <h1 id="login-title">Sign in</h1>
          <p>Enter your access token to continue to the management console.</p>
        </header>

        <form class="login-form" method="post">
          <div class="ak-field">
            <label class="ak-field-label" for="access-token">Access token</label>
            <input
              class="ak-input"
              id="access-token"
              type="password"
              name="token"
              autocomplete="current-password"
              autocapitalize="none"
              spellcheck="false"
              {% if error %}
              aria-describedby="login-error"
              aria-errormessage="login-error"
              aria-invalid="true"
              {% else %}
              aria-describedby="login-token-hint"
              {% endif %}
              required
            >
            <div class="login-feedback">
              {% if error %}
              <p class="ak-alert ak-alert-danger" id="login-error" role="alert">{{ error }}</p>
              {% else %}
              <p class="ak-field-hint" id="login-token-hint">Your token is used only to authenticate this session.</p>
              {% endif %}
            </div>
          </div>

          <button class="ak-button ak-button-primary ak-button-block" type="submit">Sign in</button>
        </form>
      </section>
    </main>
  </body>
</html>
