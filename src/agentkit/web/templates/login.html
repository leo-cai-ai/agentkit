<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in | Enterprise AI Workforce</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  </head>
  <body data-page="login">
    <main class="page-shell" style="display:flex;align-items:center;justify-content:center;min-height:100vh">
      <form class="sidebar-card" method="post" style="max-width:360px;width:100%;padding:2rem;display:flex;flex-direction:column;gap:1rem">
        <h1 style="margin:0">Workforce Console</h1>
        <p style="margin:0;color:#64748b">Enter your access token to continue.</p>
        {% if error %}
        <p role="alert" style="margin:0;color:#b91c1c">{{ error }}</p>
        {% endif %}
        <label style="display:flex;flex-direction:column;gap:0.4rem">
          <span>Access token</span>
          <input type="password" name="token" autocomplete="current-password" required>
        </label>
        <button type="submit">Sign in</button>
      </form>
    </main>
  </body>
</html>
